<!DOCTYPE html>
<html>
<head>
    <title>Table and Form</title>
   <link rel="stylesheet" href="lab2.css">
</head>
<body>
  <h1 style="text-align: center;">Welcome To Pental Shop</h1>
  <h3>About This Lab:</h3><br>
  <h4>In this lab you will learn basic html structure , formatting text,creating simple tables and using forms for input</h4>
    <table>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>50</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <div class="form-container">
        <form>
            <h1 style="text-align: center;">Contact Information</h1>
            <label>Name:</label><input type="text" name="name"><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br>

            <label>Message:</label><br>
            <textarea name="message" rows="4"></textarea><br>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
